appId: com.deploynk.minimalflashcards
---
# Scenario 1: create a standard flashcard with short question and short answer.
# This keeps the legacy card name used by the edit flow that runs later in the suite.
- tapOn:
    id: deck-detail-add-flashcard-button
- assertVisible:
    id: flashcard-form-screen
- tapOn:
    id: flashcard-form-question-input
- inputText: 'E2E Standard Flashcard Question'
- tapOn:
    id: flashcard-form-keyboard-done-button
- tapOn:
    id: flashcard-form-answer-toggle
- tapOn:
    id: flashcard-form-answer-input
- inputText: 'E2E Standard Flashcard Answer'
- tapOn:
    id: flashcard-form-keyboard-done-button
- scrollUntilVisible:
    element:
      id: flashcard-form-save-button
    direction: DOWN
- tapOn:
    id: flashcard-form-save-button
- assertVisible:
    id: deck-detail-screen
- assertVisible: 'E2E Standard Flashcard Question'

# Scenario 2: create a standard flashcard with long question and long answer.
# Both fields use the multiline long-text pattern for richer editor coverage.
- tapOn:
    id: deck-detail-add-flashcard-button
- assertVisible:
    id: flashcard-form-screen
- tapOn:
    id: flashcard-form-question-input
- inputText: 'E2E Standard Long Flashcard Question'
- pressKey: Enter
- pressKey: Enter
- inputRandomText:
    length: 800
- tapOn:
    id: flashcard-form-keyboard-done-button
- tapOn:
    id: flashcard-form-answer-toggle
- tapOn:
    id: flashcard-form-answer-input
- inputText: 'E2E Standard Long Flashcard Answer'
- pressKey: Enter
- pressKey: Enter
- inputRandomText:
    length: 800
- tapOn:
    id: flashcard-form-keyboard-done-button
- scrollUntilVisible:
    element:
      id: flashcard-form-save-button
    direction: DOWN
- tapOn:
    id: flashcard-form-save-button
- assertVisible:
    id: deck-detail-screen
- assertVisible: '.*E2E Standard Long Flashcard Question.*'

# Scenario 3: create a multiple choice flashcard with a short question.
# The answer options intentionally match the current CRUD flow for consistency.
- tapOn:
    id: deck-detail-add-flashcard-button
- assertVisible:
    id: flashcard-form-screen
- tapOn:
    id: flashcard-form-multiple-choice-toggle
- tapOn:
    id: flashcard-form-question-input
- inputText: 'E2E Multiple Choice Short Question'
- scrollUntilVisible:
    element:
      id: flashcard-form-option-input-0
    direction: DOWN
- tapOn:
    id: flashcard-form-option-input-0
- inputText: 'Option A'
- tapOn:
    id: flashcard-form-option-input-1
- inputText: 'Option B'
- tapOn:
    id: flashcard-form-keyboard-done-button
- tapOn:
    id: flashcard-form-option-correct-1
- scrollUntilVisible:
    element:
      id: flashcard-form-save-button
    direction: DOWN
- tapOn:
    id: flashcard-form-save-button
- assertVisible:
    id: deck-detail-screen
- assertVisible: 'E2E Multiple Choice Short Question'

# Scenario 4: create a multiple choice flashcard with a long question.
# Only the question changes length; the answer options remain aligned with the CRUD flow.
- tapOn:
    id: deck-detail-add-flashcard-button
- assertVisible:
    id: flashcard-form-screen
- tapOn:
    id: flashcard-form-multiple-choice-toggle
- tapOn:
    id: flashcard-form-question-input
- inputText: 'E2E Multiple Choice Long Question'
- pressKey: Enter
- pressKey: Enter
- inputRandomText:
    length: 800
- scroll
- tapOn:
    id: flashcard-form-option-input-0
- inputText: 'Option A'
- tapOn:
    id: flashcard-form-option-input-1
- inputText: 'Option B'
- tapOn:
    id: flashcard-form-keyboard-done-button
- tapOn:
    id: flashcard-form-option-correct-1
- scrollUntilVisible:
    element:
      id: flashcard-form-save-button
    direction: DOWN
- tapOn:
    id: flashcard-form-save-button
- assertVisible:
    id: deck-detail-screen
- assertVisible: '.*E2E Multiple Choice Long Question.*'

# Scenario 5: validate the minimum number of multiple choice answers.
# This must stay in the create flow because it verifies form validation before saving.
- tapOn:
    id: deck-detail-add-flashcard-button
- assertVisible:
    id: flashcard-form-screen
- tapOn:
    id: flashcard-form-multiple-choice-toggle
- tapOn:
    id: flashcard-form-question-input
- inputText: 'E2E Multiple Choice Minimum Options Question'
- pressKey: Enter
- tapOn:
    id: flashcard-form-option-input-0
- inputText: 'Only option'
- tapOn:
    id: flashcard-form-keyboard-done-button
- tapOn:
    id: flashcard-form-option-correct-0
- scrollUntilVisible:
    element:
      id: flashcard-form-save-button
    direction: DOWN
- tapOn:
    id: flashcard-form-save-button
- assertVisible:
    id: flashcard-form-screen
- assertVisible:
    id: flashcard-form-options-error
- tapOn:
    id: flashcard-form-cancel-button
- assertVisible:
    id: deck-detail-screen
